*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

/* ===== Scroll Animations ===== */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}

.fade-in{opacity:0;transition:opacity .8s ease}
